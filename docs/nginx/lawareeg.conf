# Example Nginx: serve React SPA + proxy Laravel API
# Adjust paths, domain, and PHP-FPM socket for your server.

server {
    listen 80;
    server_name lawareeg.com www.lawareeg.com;
    root /var/www/lawareeg/frontend/dist;
    index index.html;

    client_max_body_size 20M;

    # API → Laravel public/
    location /api {
        alias /var/www/lawareeg/backend/public;
        try_files $uri $uri/ @laravel;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/lawareeg/backend/public/index.php;
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        }
    }

    location @laravel {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/lawareeg/backend/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # Sanctum / storage (optional if assets served via API host)
    location /storage {
        alias /var/www/lawareeg/backend/public/storage;
        access_log off;
        expires 30d;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        access_log off;
    }
}
