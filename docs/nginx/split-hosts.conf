# Optional split: API on api.lawareeg.com, SPA on lawareeg.com

server {
    listen 80;
    server_name api.lawareeg.com;
    root /var/www/lawareeg/backend/public;
    index index.php;
    client_max_body_size 20M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

server {
    listen 80;
    server_name lawareeg.com www.lawareeg.com;
    root /var/www/lawareeg/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
