upstream lawareeg_php {
    server backend:9000;
}

upstream lawareeg_spa {
    server frontend:80;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # Basic hardening headers (host TLS terminates HTTPS in front)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Laravel JSON API (routes are prefixed with /api)
    location /api {
        include fastcgi_params;
        fastcgi_pass lawareeg_php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_read_timeout 120s;
    }

    location = /up {
        include fastcgi_params;
        fastcgi_pass lawareeg_php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
    }

    # Block legacy public copies of sensitive uploads (now served via signed API routes)
    location ~ ^/storage/(payment-proofs|seller-verifications|messages)/ {
        deny all;
        return 404;
    }

    # Public marketplace media only (avatars, listing screenshots)
    location /storage/ {
        alias /var/www/storage/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Deny hidden / backup files
    location ~ /\. {
        deny all;
    }

    # React SPA
    location / {
        proxy_http_version 1.1;
        proxy_pass http://lawareeg_spa;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
