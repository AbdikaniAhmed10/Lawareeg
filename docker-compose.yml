# Lawareeg — production-oriented Docker stack
# Frontend (SPA) + Laravel API (PHP-FPM) + Nginx + MySQL
#
# Usage:
#   cp .env.docker.example .env.docker
#   # edit secrets, domain, mail
#   docker compose --env-file .env.docker up -d --build
#
# Contabo: put host Nginx/Caddy in front with HTTPS and proxy to this stack
# (see docs/DEPLOY_CONTABO.md). Use a subdomain so it coexists with other apps.

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-lawareeg}
      MYSQL_USER: ${DB_USERNAME:-lawareeg}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.docker}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env.docker}
    volumes:
      - lawareeg_mysql:/var/lib/mysql
    networks:
      - lawareeg
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-lawareeg}
      DB_USERNAME: ${DB_USERNAME:-lawareeg}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    volumes:
      - lawareeg_storage:/var/www/html/storage/app/public
      - lawareeg_private:/var/www/html/storage/app/private
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - lawareeg

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    networks:
      - lawareeg

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LAWAREEG_HTTP_PORT:-8088}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - lawareeg_storage:/var/www/storage:ro
      - ./backend/public:/var/www/html/public:ro
    depends_on:
      - backend
      - frontend
    networks:
      - lawareeg

volumes:
  lawareeg_mysql:
  lawareeg_storage:
  lawareeg_private:

networks:
  lawareeg:
    name: lawareeg_net
